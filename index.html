<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#fdfbf7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Lexicon</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn.lucide.dev/book-open.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['Merriweather', 'serif'],
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              paper: {
                50: '#fdfbf7', // Warm White
                100: '#fcfaf5',
                200: '#f5f0e6',
                300: '#e6dfd1',
                800: '#4a453e',
                900: '#1c1917',
              },
              ink: {
                DEFAULT: '#1a1a1a',
                light: '#4a4a4a',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Custom Scrollbar for that premium feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d6d3cd;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #bab7b1;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* KaTeX Overrides for consistency and "Bold" look */
      .katex {
        font-size: 1.15em !important;     /* Slightly larger than text for clarity */
        font-weight: 600 !important;      /* Bolder as requested */
        font-family: 'Merriweather', serif !important; /* Blend with content */
        color: inherit !important;
        line-height: 1.2 !important;
      }
      
      .katex .base {
        margin-top: 2px;
      }

      /* Prevent display equations from breaking flow excessively */
      .katex-display {
        margin: 1em 0 !important;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0.5em 0;
      }
    </style>

  }
}
</script>
